<!-- Duotone filter: maps shadows to the base off-black and highlights to the
     accent blue, applied to the headshot via the .duotone utility. Rendered
     once here so the whole document can reference #duotone-accent. -->
<svg aria-hidden="true" focusable="false" width="0" height="0" style="position: absolute">
  <filter id="duotone-accent" color-interpolation-filters="sRGB">
    <feColorMatrix
      type="matrix"
      values="0.33 0.33 0.33 0 0
              0.33 0.33 0.33 0 0
              0.33 0.33 0.33 0 0
              0    0    0    1 0"
    />
    <feComponentTransfer>
      <feFuncR type="table" tableValues="0.043 0.298" />
      <feFuncG type="table" tableValues="0.051 0.490" />
      <feFuncB type="table" tableValues="0.063 1.0" />
    </feComponentTransfer>
  </filter>
</svg>
